<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 말투 변환기 — BizTalk</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>업무 말투 변환기</h1>
            <p>일상적인 말투를 상황에 맞는 비즈니스 언어로 바꿔보세요.</p>
        </header>

        <main>
            <!-- 원문 입력 섹션 -->
            <section class="input-section">
                <textarea id="inputText" placeholder="변환할 내용을 입력하세요... (예: 내일까지 보고서 제출 어려울 것 같음)"></textarea>
            </section>

            <!-- 수신 대상 선택 섹션 -->
            <section class="selection-section">
                <label>수신 대상 선택</label>
                <div class="target-group">
                    <button class="target-btn" data-target="boss">상사 / 임원</button>
                    <button class="target-btn" data-target="colleague">타팀 동료</button>
                    <button class="target-btn" data-target="client">고객 / 외부</button>
                    <button class="target-btn" data-target="team">팀 내 동료</button>
                </div>
            </section>

            <!-- 실행 섹션 -->
            <section class="action-section">
                <button id="convertBtn" onclick="convertTone()">변환하기</button>
            </section>

            <!-- 결과 출력 섹션 -->
            <section class="output-section">
                <div class="output-header">
                    <label>변환 결과</label>
                </div>
                <textarea id="outputText" readonly placeholder="변환 결과가 여기에 표시됩니다."></textarea>
                <button id="copyBtn" onclick="copyToClipboard()">결과 복사하기</button>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 BizTalk — Vibe Coding 실습 프로젝트</p>
        </footer>
    </div>

    <!-- 로딩 인디케이터 -->
    <div id="loadingOverlay" class="hidden">
        <div class="spinner"></div>
        <p>말투 변환 중...</p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
