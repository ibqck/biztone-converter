<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 말투 변환기 — BizTalk</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col items-center py-12 px-4">
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl shadow-slate-200/50 p-8 md:p-10 border border-slate-100">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-blue-600 tracking-tight mb-2">업무 말투 변환기</h1>
            <p class="text-slate-500 font-medium">일상적인 말투를 격조 있는 비즈니스 언어로 디자인해드립니다.</p>
        </header>

        <main class="space-y-8">
            <!-- 원문 입력 섹션 -->
            <section>
                <label for="inputText" class="block text-sm font-bold text-slate-700 mb-3 ml-1">원문 입력</label>
                <textarea id="inputText" 
                    class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all resize-none" 
                    placeholder="변환할 내용을 입력하세요... (예: 내일까지 보고서 제출 어려울 것 같음)"></textarea>
            </section>

            <!-- 수신 대상 선택 섹션 -->
            <section>
                <label class="block text-sm font-bold text-slate-700 mb-3 ml-1">수신 대상 선택</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button class="target-btn py-3 px-4 bg-white border border-slate-200 rounded-xl text-sm font-semibold hover:bg-slate-50 hover:border-slate-300 transition-all active:scale-[0.98]" data-target="boss">상사 / 임원</button>
                    <button class="target-btn py-3 px-4 bg-white border border-slate-200 rounded-xl text-sm font-semibold hover:bg-slate-50 hover:border-slate-300 transition-all active:scale-[0.98]" data-target="colleague">타팀 동료</button>
                    <button class="target-btn py-3 px-4 bg-white border border-slate-200 rounded-xl text-sm font-semibold hover:bg-slate-50 hover:border-slate-300 transition-all active:scale-[0.98]" data-target="client">고객 / 외부</button>
                    <button class="target-btn py-3 px-4 bg-white border border-slate-200 rounded-xl text-sm font-semibold hover:bg-slate-50 hover:border-slate-300 transition-all active:scale-[0.98]" data-target="team">팀 내 동료</button>
                </div>
            </section>

            <!-- 실행 섹션 -->
            <section>
                <button id="convertBtn" onclick="convertTone()" 
                    class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold text-lg shadow-lg shadow-blue-200 transition-all transform active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed">
                    변환하기
                </button>
            </section>

            <!-- 결과 출력 섹션 -->
            <section class="pt-8 border-t border-slate-100">
                <div class="flex items-center justify-between mb-3 ml-1">
                    <label class="text-sm font-bold text-slate-700">변환 결과</label>
                </div>
                <textarea id="outputText" readonly 
                    class="w-full h-40 p-4 bg-blue-50/50 border border-blue-100 rounded-xl text-slate-800 focus:outline-none mb-4" 
                    placeholder="변환 결과가 여기에 표시됩니다."></textarea>
                <button id="copyBtn" onclick="copyToClipboard()" 
                    class="w-full py-3 bg-white border-2 border-blue-600 text-blue-600 rounded-xl font-bold hover:bg-blue-50 transition-all active:scale-[0.99]">
                    결과 복사하기
                </button>
            </section>
        </main>

        <footer class="mt-12 text-center text-xs text-slate-400 font-medium">
            <p>&copy; 2024 BizTalk — Vibe Coding 실습 프로젝트</p>
        </footer>
    </div>

    <!-- 로딩 인디케이터 -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-50">
        <div class="spinner mb-4"></div>
        <p class="text-blue-600 font-bold">인공지능이 문장을 다듬고 있습니다...</p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
